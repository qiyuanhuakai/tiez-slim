name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: tiez-slim-linux
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  draft-release:
    name: Build and create draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release binary
        run: |
          mkdir -p dist
          cp "target/release/${APP_NAME}" "dist/${APP_NAME}"
          archive="${APP_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          tar -C dist -czf "dist/${archive}" "${APP_NAME}"
          (cd dist && sha256sum "${archive}" > "${archive}.sha256")

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
